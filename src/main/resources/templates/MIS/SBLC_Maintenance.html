<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Risk Insights — SBLC Maintenance</title>

	<link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/5.9.0/css/all.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables/1.10.19/css/jquery.dataTables.min.css}" />
	<link rel="stylesheet" th:href="@{/css/CustomButton.css}" />
	<link rel="stylesheet" th:href="@{/css/bank-theme.css}" />
	<link rel="stylesheet" th:href="@{/css/UniversalTable.css}" />
	<link rel="icon" th:href="@{/images/Bornfire.png}" type="image/x-icon">

	<script th:src="@{/webjars/jquery/3.4.1/jquery.min.js}"></script>
	<script th:src="@{/webjars/popper.js/1.14.7/umd/popper.min.js}"></script>
	<script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
	<script th:src="@{/webjars/datatables/1.10.19/js/jquery.dataTables.min.js}"></script>
	<script th:src="@{/webjars/datatables/1.10.19/js/dataTables.bootstrap4.min.js}"></script>

	<style>
		:root {
			--bob-orange: #FF7B00;
		}

		body {
			font-family: 'Segoe UI', Arial, sans-serif;
			font-size: 12px;
			background: var(--bank-page-bg, #F7F4F1);
			margin: 0;
			padding: 0;
			min-height: 100vh;
			overflow-x: hidden;
		}

		.sblc-page {
			margin-top: 20px;
			padding: 0 12px 24px;
			max-width: 100%;
		}

		@media (max-width: 767px) {
			.sblc-page {
				padding: 0 8px 16px;
			}

			.formline label {
				margin-bottom: 4px;
			}
		}

		.role-page-header {
			background-color: #ffffff;
			padding: 12px 16px;
			border-radius: 8px 8px 0 0;
		}

		.user-list-card,
		.user-form-card {
			background: #fff;
			border-radius: 8px;
			border: 1px solid var(--bank-border, #E8DDD2);
			box-shadow: 0 2px 8px rgba(61, 43, 31, 0.06);
			overflow: hidden;
		}

		.table-wrap {
			padding: 12px;
			overflow-x: auto;
		}

		.formline {
			padding-bottom: 15px;
			align-items: center;
		}

		.formline label {
			word-break: break-word;
		}

		.bob-loader {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255, 255, 255, 0.7);
			backdrop-filter: blur(4px);
			z-index: 9999;
			visibility: hidden;
			opacity: 0;
			transition: 0.3s;
		}

		.bob-loader.show {
			visibility: visible;
			opacity: 1;
		}

		.role-btn {
			background: var(--bob-orange);
			color: white;
			border: none;
			padding: 6px 14px;
			border-radius: 4px;
			cursor: pointer;
			font-weight: 600;
			font-size: 12px;
		}

		.role-btn:hover {
			color: #fff;
			opacity: 0.92;
		}

		.static-back-btn {
			background-color: #fff;
			border: none;
			color: var(--bank-primary, #FF7B00);
			font-size: 16px;
			border-radius: 50%;
			width: 36px;
			height: 36px;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			transition: background-color 0.25s ease, transform 0.15s ease;
			cursor: pointer;
		}

		.static-back-btn:hover {
			background-color: var(--bank-primary, #FF7B00);
			color: #fff;
			transform: scale(1.08);
		}

		.page-title {
			margin: 0;
			line-height: 36px;
			font-family: Verdana, Arial, sans-serif;
			font-size: 20px;
			font-weight: bold;
			color: #0D0D0C;
		}

		.user-form-card-body {
			padding: 16px 20px 24px;
		}

		#usertable {
			border-collapse: collapse !important;
			font-family: Arial, sans-serif !important;
			font-size: 12px !important;
			width: 100% !important;
		}

		#usertable thead th {
			background-color: var(--table-header-blue, #FF7B00) !important;
			color: #fff;
			font-family: Arial, sans-serif !important;
			font-size: 14px !important;
			text-align: left;
			vertical-align: middle;
			white-space: nowrap;
			padding: 10px 8px !important;
			line-height: 1.1 !important;
			border: 1px solid rgba(0, 0, 0, 0.08);
		}

		#usertable td {
			padding: 8px !important;
			border: 1px solid #e8e8e8 !important;
			background: #fafafa;
			white-space: normal !important;
			vertical-align: middle;
		}

		#usertable tbody tr:nth-child(even) td {
			background-color: #f4f2ef !important;
		}

		#usertable tbody tr:nth-child(odd) td {
			background-color: #ffffff !important;
		}

		#usertable tbody tr:hover td {
			background-color: #f1f1f1 !important;
		}

		.action-cell {
			text-align: center;
			white-space: nowrap;
		}

		.dataTables_filter label {
			display: flex !important;
			align-items: center;
			gap: 8px;
			margin-bottom: 0 !important;
		}

		.dataTables_wrapper .paginate_button.active .page-link {
			background-color: var(--bank-primary, #FF7B00) !important;
			border-color: var(--bank-primary-dark, #1E40AF) !important;
			color: #ffffff !important;
		}
	</style>

	<script th:inline="javascript">
		function showLoader() {
			document.getElementById('bob-loader').classList.add('show');
		}

		function hideLoader() {
			document.getElementById('bob-loader').classList.remove('show');
		}

		function goBack() {
			showLoader();
			window.history.back();
		}

		function list() {
			showLoader();
			location.href = 'sblc_maintenance?formmode=list';
		}

		function addForm() {
			showLoader();
			location.href = 'sblc_maintenance?formmode=add';
		}

		function editForm(id) {
			showLoader();
			location.href = 'sblc_maintenance?formmode=edit&id=' + id;
		}

		function viewForm(id) {
			showLoader();
			location.href = 'sblc_maintenance?formmode=view&id=' + id;
		}

		function submitSblc() {
			if ($('#sol_id').val().trim() === '') {
				alert('Enter Sol ID');
				return;
			}
			if ($('#account_no').val().trim() === '') {
				alert('Enter Account No');
				return;
			}

			showLoader();
			var currentMode = /*[[${formmode}]]*/ 'add';
			var formData = $('#sblcForm').serialize();

			$.ajax({
				url: './sblc_save?formmode=' + currentMode,
				type: 'POST',
				data: formData,
				success: function (res) {
					hideLoader();
					$('#alertmsg').text(res);
					$('#alertModal').modal('show');
				},
				error: function (xhr) {
					hideLoader();
					alert('Error: ' + xhr.responseText);
				}
			});
		}

		function deleteForm(id) {
			if (!confirm('Are you sure you want to delete this record?')) {
				return;
			}
			showLoader();
			$.ajax({
				type: 'POST',
				url: './sblc_save?formmode=delete',
				data: { id: id },
				success: function () {
					location.reload();
				},
				error: function () {
					hideLoader();
					alert('Error deleting record');
				}
			});
		}

		$(document).ready(function () {
			if ($('#usertable').length) {
				$('#usertable').DataTable({
					paging: true,
					pageLength: 10,
					ordering: false,
					searching: true,
					lengthChange: false,
					autoWidth: false,
					dom: '<"d-flex justify-content-between align-items-center mb-2"fp>rt'
				});
			}
			hideLoader();
		});

		window.addEventListener('pageshow', function () {
			hideLoader();
		});
	</script>
</head>

<body>
	<div class="bob-loader" id="bob-loader" role="status">
		<div class="text-center">
			<img th:src="@{/images/bobn.png}" height="60" alt="Loading...">
			<div class="progress mt-2" style="height: 5px; width: 200px;">
				<div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" style="width: 100%"></div>
			</div>
		</div>
	</div>

	<div th:insert="~{XBRLHeaderMenu :: header}" class="fixed-top"></div>

	<div class="container-fluid sblc-page">

		<!-- LIST VIEW -->
		<div th:if="${formmode}=='list'">
			<div class="user-list-card">
				<div class="role-page-header d-flex justify-content-between align-items-center">
					<div class="d-flex align-items-center">
						<button class="static-back-btn" type="button" onclick="goBack()" title="Go Back">
							<i class="fa fa-arrow-left"></i>
						</button>
						<h4 class="page-title">SBLC Maintenance</h4>
					</div>
					<button type="button" class="role-btn" onclick="addForm()">Add New</button>
				</div>
				<div class="table-wrap">
					<table class="table refund-table align-middle mb-0" id="usertable" style="width:100%">
						<thead>
							<tr>
								<th>Srl No</th>
								<th>Sol ID</th>
								<th>Account No</th>
								<th>GL Subhead</th>
								<th>Customer Name</th>
								<th>Bank Name</th>
								<th>Report Date</th>
								<th>Action</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="sblc : ${listall}">
								<td th:text="${sblc.srl_no}"></td>
								<td th:text="${sblc.sol_id}"></td>
								<td th:text="${sblc.account_no}"></td>
								<td th:text="${sblc.gl_subhead}"></td>
								<td th:text="${sblc.customer_name}"></td>
								<td th:text="${sblc.bank_name}"></td>
								<td th:text="${#dates.format(sblc.report_date, 'dd-MM-yyyy')}"></td>
								<td class="action-cell">
									<i class="fa fa-eye text-info mr-3" style="cursor:pointer" title="View"
										th:attr="data-id=${sblc.id}" onclick="viewForm(this.getAttribute('data-id'))"></i>
									<i class="fa fa-trash text-danger" style="cursor:pointer" title="Delete"
										th:attr="data-id=${sblc.id}" onclick="deleteForm(this.getAttribute('data-id'))"></i>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<!-- ADD / EDIT / VIEW -->
		<div th:if="${formmode} != 'list'">
			<div class="user-form-card shadow-sm">
				<div class="role-page-header d-flex justify-content-between align-items-center">
					<div class="d-flex align-items-center">
						<button class="static-back-btn" type="button" onclick="goBack()" title="Go Back">
							<i class="fa fa-arrow-left"></i>
						</button>
						<h4 class="page-title"
							th:text="${formmode == 'add' ? 'SBLC Maintenance - Add' : (formmode == 'edit' ? 'SBLC Maintenance - Modify' : 'SBLC Maintenance - View')}">
							SBLC Maintenance
						</h4>
					</div>
					<button type="button" class="role-btn" onclick="list()">List</button>
				</div>
				<div class="user-form-card-body">
					<form id="sblcForm" method="post" autocomplete="off">
						<input type="hidden" name="id" th:value="${formmode == 'add' ? nextId : list?.id}" />

						<div class="row formline">
							<label class="col-sm-2 col-form-label">Srl No</label>
							<div class="col-sm-4">
								<input type="text" name="srl_no" class="form-control form-control-sm" readonly
									th:value="${formmode == 'add' ? nextId : list.srl_no}" />
							</div>
							<label class="col-sm-2 col-form-label">Sol ID</label>
							<div class="col-sm-4">
								<input type="text" id="sol_id" name="sol_id" class="form-control form-control-sm"
									th:value="${list?.sol_id}" th:readonly="${formmode == 'view'}" />
							</div>
						</div>

						<div class="row formline">
							<label class="col-sm-2 col-form-label">Account No</label>
							<div class="col-sm-4">
								<input type="text" id="account_no" name="account_no" class="form-control form-control-sm"
									th:value="${list?.account_no}" th:readonly="${formmode == 'view'}" />
							</div>
							<label class="col-sm-2 col-form-label">Customer Name</label>
							<div class="col-sm-4">
								<input type="text" name="customer_name" class="form-control form-control-sm"
									th:value="${list?.customer_name}" th:readonly="${formmode == 'view'}" />
							</div>
						</div>

						<div class="row formline">
							<label class="col-sm-2 col-form-label">GL Subhead</label>
							<div class="col-sm-4">
								<input type="text" name="gl_subhead" class="form-control form-control-sm"
									th:value="${list?.gl_subhead}" th:readonly="${formmode == 'view'}" />
							</div>
							<label class="col-sm-2 col-form-label">Bank Name</label>
							<div class="col-sm-4">
								<input type="text" name="bank_name" class="form-control form-control-sm"
									th:value="${list?.bank_name}" th:readonly="${formmode == 'view'}" />
							</div>
						</div>

						<div class="row formline">
							<label class="col-sm-2 col-form-label">Branch Name</label>
							<div class="col-sm-4">
								<input type="text" name="branch_name" class="form-control form-control-sm"
									th:value="${list?.branch_name}" th:readonly="${formmode == 'view'}" />
							</div>
							<label class="col-sm-2 col-form-label">Report Date</label>
							<div class="col-sm-4">
								<input type="date" id="report_date" name="report_date" class="form-control form-control-sm"
									th:value="${#dates.format(list?.report_date, 'yyyy-MM-dd')}"
									th:readonly="${formmode == 'view'}" />
							</div>
						</div>

						<div class="text-center mt-3" th:if="${formmode != 'view'}">
							<button type="button" class="role-btn px-5" onclick="submitSblc()">Submit</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="alertModal" tabindex="-1" role="dialog" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered" role="document">
			<div class="modal-content">
				<div class="modal-header" style="background-color: var(--table-header-blue, #FF7B00); color: white;">
					<h5 class="modal-title">Bank of Baroda</h5>
					<button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
						<span aria-hidden="true">&times;</span>
					</button>
				</div>
				<div class="modal-body text-center">
					<p id="alertmsg" style="font-weight: 500;"></p>
					<button type="button" class="role-btn" onclick="list()">Close</button>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
