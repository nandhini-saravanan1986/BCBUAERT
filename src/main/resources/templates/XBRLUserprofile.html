<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-4.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<title>RiskInsights - User Profile</title>

	<!-- CSS Links -->
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/5.9.0/css/all.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/jquery-ui/1.12.1/jquery-ui.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables/1.10.19/css/jquery.dataTables.min.css}" />
	<link rel="stylesheet" th:href="@{/css/CustomButton.css}" />
	<link rel="stylesheet" th:href="@{/css/bank-theme.css}" />
	<link rel="stylesheet" th:href="@{/css/UniversalTable.css}" />

	<!-- JavaScript Links -->
	<script th:src="@{/webjars/jquery/3.4.1/jquery.min.js}"></script>
	<script th:src="@{/webjars/jquery-ui/1.12.1/jquery-ui.min.js}"></script>
	<script th:src="@{/webjars/popper.js/1.14.7/umd/popper.min.js}"></script>
	<script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
	<script th:src="@{/webjars/jquery-validation/1.19.0/jquery.validate.min.js}"></script>
	<script th:src="@{/webjars/datatables/1.10.19/js/jquery.dataTables.min.js}"></script>
	<script th:src="@{/webjars/datatables/1.10.19/js/dataTables.bootstrap4.min.js}"></script>

	<style>
		:root {
			--bob-orange: #FF7B00;
			--bob-blue: #004080;
		}

		body {
			font-family: 'Segoe UI', Arial, sans-serif;
			font-size: 12px;
			background: var(--bank-page-bg, #F7F4F1);
			margin: 0;
			padding: 0;
			min-height: 100vh;
			overflow-x: hidden;
			overflow-y: auto;
		}

		.user-profile-page {
			margin-top: 20px;
			padding: 0 12px 24px;
			max-width: 100%;
		}

		.formline label {
			word-break: break-word;
		}

		@media (max-width: 767px) {
			.user-profile-page {
				padding: 0 8px 16px;
			}

			.formline label {
				margin-bottom: 4px;
			}
		}

		.role-page-header {
			background-color: #ffffff;
			padding: 12px 16px;
			border-radius: 8px 8px 0 0;
		}

		.user-list-card,
		.user-form-card {
			background: #fff;
			border-radius: 8px;
			border: 1px solid var(--bank-border, #E8DDD2);
			box-shadow: 0 2px 8px rgba(61, 43, 31, 0.06);
			overflow: hidden;
		}

		.table-wrap {
			padding: 12px;
			overflow-x: auto;
		}

		.formline {
			padding-bottom: 15px;
			align-items: center;
		}

		.bob-loader {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255, 255, 255, 0.7);
			backdrop-filter: blur(4px);
			z-index: 9999;
			visibility: hidden;
			opacity: 0;
			transition: 0.3s;
		}

		.bob-loader.show {
			visibility: visible;
			opacity: 1;
		}

		.role-btn {
			background: var(--bob-orange);
			color: white;
			border: none;
			padding: 5px 10px;
			border-radius: 4px;
			cursor: pointer;
			font-weight: 600;
		}

		input[readonly],
		select[disabled] {
			background-color: #e9ecef !important;
			cursor: not-allowed;
		}

		/* Modal Category & Grid Styling */
		.category-head {
			background: #f8f9fa;
			font-weight: bold;
			padding: 5px 10px;
			border-left: 4px solid var(--bob-orange);
			margin: 10px 0;
			color: #333;
		}

		.module-grid {
			display: flex;
			flex-wrap: wrap;
			padding-left: 15px;
		}

		.module-item {
			width: 50%;
			padding: 3px 0;
			font-size: 12px;
		}

		.module-item label {
			margin: 0;
			font-weight: normal;
			cursor: pointer;
		}

		.module-access-readonly {
			max-height: 420px;
			overflow-y: auto;
			border: 1px solid var(--bank-border, #E8DDD2);
			border-radius: 6px;
			padding: 10px 12px;
			background: #f8f9fa;
		}

		.module-access-readonly input[type="checkbox"] {
			pointer-events: none;
		}

		.module-access-readonly label {
			cursor: default;
			color: #495057;
		}

		.modal-header {
			background: var(--table-header-blue, #FF7B00);
			color: white;
		}
		.static-back-btn {
		    background-color: rgb(255, 255, 255);
		    border: none;
		    color: var(--bank-primary, #FF7B00);
		    font-size: 16px;
		    border-radius: 50%;
		    width: 36px;
		    height: 36px;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    margin-right: 10px;
		    transition: background-color 0.25s ease, transform 0.15s ease;
		    cursor: pointer;
		}

		/* Hover effect */
		.static-back-btn:hover {
		    background-color: var(--bank-primary, #FF7B00);   /* darker orange */
		    color: rgb(255, 255, 255);
		    transform: scale(1.08);
		}

		/* Optional click effect */
		.static-back-btn:active {
		    transform: scale(0.95);
		}

		#pageHeader {
			position: sticky;
			top: 110px;
			z-index: 1050;
			background: white;
			padding-top: 10px;
		}

		#tabHeader {
			margin-top: 0;
		}

		.user-form-card-body {
			padding-bottom: 24px;
		}

		#usertable {
			border-collapse: collapse !important;
			font-family: Arial, sans-serif !important;
			font-size: 12px !important;
			width: 100%;
		}

		#usertable thead th {
			background-color: var(--table-header-blue, #FF7B00) !important;
			color: #fff;
			font-family: Arial, sans-serif !important;
			font-size: 14px !important;
			text-align: center;
			vertical-align: middle;
			white-space: normal;
			padding: 10px 4px !important;
			line-height: 1.1 !important;
			box-shadow: inset 0 -1px 0 #dee2e6;
		}

		#usertable td {
			padding: 5px 6px !important;
			border: 1px solid #e8e8e8 !important;
			background: #fafafa;
			white-space: normal !important;
		}

		#usertable tbody tr:nth-child(even) {
			background-color: #f4f2ef !important;
		}

		#usertable tbody tr:nth-child(odd) {
			background-color: #ffffff !important;
		}

		.dataTables_filter label {
			display: flex !important;
			align-items: center;
			gap: 8px;
			margin-bottom: 0 !important;
		}

		.dataTables_filter input {
			margin-left: 5px;
			flex: 1;
		}

		.dataTables_wrapper .page-link:focus,
		.dataTables_wrapper .page-link:active {
			box-shadow: none !important;
			outline: none !important;
		}

		.dataTables_wrapper .paginate_button.previous .page-link,
		.dataTables_wrapper .paginate_button.next .page-link {
			color: #9e9e9e !important;
			background-color: transparent !important;
			border-color: #dddddd !important;
		}

		.dataTables_wrapper .paginate_button.previous .page-link:hover,
		.dataTables_wrapper .paginate_button.next .page-link:hover {
			color: #c5c5c5 !important;
			background-color: #f0f0f0 !important;
		}

		.dataTables_wrapper .paginate_button.disabled .page-link {
			color: #c5c5c5 !important;
			background-color: #eeeeee !important;
			cursor: not-allowed;
		}

		.dataTables_wrapper .paginate_button:not(.previous):not(.next):not(.active) .page-link {
			color: var(--bank-primary, #FF7B00) !important;
			background-color: transparent !important;
			border-color: #dddddd !important;
		}

		.dataTables_wrapper .paginate_button:not(.previous):not(.next):not(.active) .page-link:hover {
			background-color: #f5f5f5 !important;
			color: var(--bank-primary, #FF7B00) !important;
		}

		.dataTables_wrapper .paginate_button.active .page-link {
			background-color: var(--bank-primary, #FF7B00) !important;
			border-color: var(--bank-primary-dark, #1E40AF) !important;
			color: #ffffff !important;
			cursor: default !important;
		}

		.dataTables_wrapper .dataTables_paginate .paginate_button {
			margin: 0 1px !important;
			min-width: auto !important;
		}

		.dataTables_wrapper {
			width: 100%;
			overflow-x: auto;
		}
	</style>

	<script th:inline="javascript">
		/*<![CDATA[*/
		
		




		function showLoader() {$('.bob-loader').addClass('show');}
		function hideLoader() {$('.bob-loader').removeClass('show');}

		function list() {showLoader(); location.href = 'UserProfile?formmode=list';}
		function adduser() {showLoader(); location.href = 'UserProfile?formmode=add';}

		function fnView(a) {var userid = a.getAttribute("data-userid"); showLoader(); location.href = 'UserProfile?formmode=view&userid=' + userid;}

		function fnEdit(a) {
			var userid = a.getAttribute("data-userid");
			var loggedInRole = /*[[${session.ROLEID}]]*/ '';
			if (loggedInRole === "ADM-M" || loggedInRole === "ADM-C") {
				showLoader(); location.href = 'UserProfile?formmode=edit&userid=' + userid;
			} else {
				alert('Access Denied: Modifications only allowed for Admin roles.');
			}
		}

		function fnVerify(a) {
			var userid = a.getAttribute("data-userid");
			showLoader(); location.href = 'UserProfile?formmode=verify&userid=' + userid;
		}

		
		function departmentVal() {

		    var dept = $("#department").val();

		    if (dept == "RISK") {
		        console.log("Risk Department Selected");
		    }else if (dept == "IT") {
				  console.log("IT Department Selected");
            } 

		}
		function Branchcodeval() {


			var Branchcode = $("#branchCode").find(':selected').val();

			if (Branchcode == '9001') {
				$("#branchName").val("Dubai");
			} else if (Branchcode == '9002') {
				$("#branchName").val("Abu Dhabi");
			} else if (Branchcode == '9003') {
				$("#branchName").val("Deira");
			} else if (Branchcode == '9004') {
				$("#branchName").val("Sharja");
			} else if (Branchcode == '9005') {
				$("#branchName").val("Ras Alkaima");
			} else if (Branchcode == '9008') {
				$("#branchName").val("Syndication");
			} else if (Branchcode == '9019') {
				$("#branchName").val("DFC");
			}

			$(this).find(':selected').text();

		}

		function roledesc() {
			var roleId = $("#roleId").val();
			if (!roleId) {
				$("#role_desc").val("");
				$("#work_class").val("");
				$("#permissions").val("");
				return;
			}
			$.ajax({
				url: /*[[@{/getRoleDetails}]]*/ "/getRoleDetails",
				type: "GET",
				data: {roleId: roleId},
				success: function (data) {
					if (data) {
						$("#role_desc").val(data.roleDesc || "");
						$("#work_class").val(data.workClass || "");
						$("#permissions").val(data.permissions || "");
					}
				},
				error: function () {
					$("#role_desc").val("");
					$("#work_class").val("");
					$("#permissions").val("");
					alert("Unable to load selected role details.");
				}
			});
		}

		function submitModules() {
			let selected = [];
			$("#permissionForm input[name='domId']:checked").each(function () {
				selected.push($(this).val());
			});
			if (selected.length === 0) {
				alert("Please select at least one menu option.");
				return;
			}
			$("#domain_id").val(Array.from(new Set(selected)).join(","));
			$('#moduleModal').modal('hide');
		}

		function syncCheckboxes(menuString, formSelector) {
			var form = formSelector || "#permissionForm";
			$(form + " input[name='domId']").prop("checked", false);
			if (!menuString) {
				return;
			}
			var menus = menuString.split(",").map(function (item) {
				return item.trim();
			}).filter(Boolean);
			$(form + " input[name='domId']").each(function () {
				if (menus.indexOf($(this).val()) >= 0) {
					$(this).prop("checked", true);
				}
			});
		}

		function initModuleAccessReadonlyView() {
			if (!$("#permissionViewForm").length) {
				return;
			}
			syncCheckboxes($("#domain_id").val(), "#permissionViewForm");
		}

		function validateUserId() {
			var regex = /^[A-Za-z]{2}[0-9]{6}$/;
			var val = $("#userid").val();
			if (val && !regex.test(val)) {
				$("#feedbackuser").text("Format: 2 letters + 6 digits").css("color", "red");
			} else {
				$("#feedbackuser").text("");
			}
		}

		function validatePassword() {
			var p = $("#password").val();
			var strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#\$%\^&\*])(?=.{14,})/;
			if (p && !strongRegex.test(p)) {
				$("#feedback").html("Weak Password").css("color", "red");
			} else {
				$("#feedback").html("Strong Password").css("color", "green");
			}
		}

		function submitForm() {
			if (!$("#userForm").valid()) return;
			var formmode = $("#formmode").val();
			var roleId = ($("#roleId").val() || "").trim();
			var workClass = ($("#work_class").val() || "").trim();
			var permissions = ($("#permissions").val() || "").trim();
			var moduleAccess = ($("#domain_id").val() || "").trim();
			var userId = ($("#userid").val() || "").trim();
			var department = ($("#department").val() || "").trim();
			var userIdRegex = /^[A-Za-z]{2}[0-9]{6}$/;

			if (formmode === "add" && userId && !userIdRegex.test(userId)) {
				alert("User ID must be 2 letters followed by 6 digits.");
				return;
			}
			if (formmode === "add") {
				var p = $("#password").val() || "";
				var strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#\$%\^&\*])(?=.{14,})/;
				if (!strongRegex.test(p)) {
					alert("Password must be at least 14 characters and include upper, lower, number, and special character.");
					return;
				}
			}
			if (!roleId) {
				alert("Role ID is required.");
				return;
			}
			if (!department) {
				alert("Department is required.");
				return;
			}
			if (!workClass || !permissions || !moduleAccess) {
				alert("Please select a Role ID and choose menu access using the search button next to Module Access.");
				return;
			}
			showLoader();
			$.ajax({
				url: "./createUser?formmode=" + $("#formmode").val(),
				type: 'POST',
				data: $("#userForm").serialize(),
				success: function (res) {hideLoader(); alert(res); list();},
				error: function () {hideLoader(); alert("Submission Failed");}
			});
		}

		function verifySubmit(btn) {
			var creator = btn.getAttribute("data-entry_user");
			var loginUser = /*[[${session.USERID}]]*/ '';
			if (creator === loginUser) {
				alert("Maker-Checker Violation: Same user cannot verify.");
				return;
			}
			if (!confirm("Verify this profile?")) return;
			showLoader();
			$.ajax({
				url: './verifyUser',
				type: 'POST',
				data: $('#userForm').serialize(),
				success: function (res) {hideLoader(); alert(res); list();}
			});
		}
		$(document).ready(function () {
			if ($('#userForm').length) {
				$('#userForm').validate({
					ignore: ':disabled',
					rules: {
						userid: { required: true },
						username: { required: true },
						email_id: { email: true }
					}
				});
				if ($('#roleId').val()) {
					roledesc();
				}
				var existingAccess = $("#domain_id").val();
				if (existingAccess) {
					syncCheckboxes(existingAccess);
				}
				initModuleAccessReadonlyView();
				$('#moduleModal').on('show.bs.modal', function () {
					syncCheckboxes($("#domain_id").val());
				});
				$(document).on('change', "#permissionForm input[name='domId']", function () {
					var val = $(this).val();
					var checked = $(this).is(':checked');
					$("#permissionForm input[name='domId'][value='" + val + "']").prop('checked', checked);
				});
			}
			if ($('#usertable').length) {
				$('#usertable').DataTable({
					paging: true,
					ordering: false,
					searching: true,
					pageLength: 10,
					lengthChange: false,
					responsive: true,
					autoWidth: false,
					dom: '<"d-flex justify-content-between align-items-center mb-2"fp>rt'
				});
			}
		});

			
			function goBack() {
			    window.history.back();
			}

			window.addEventListener("pageshow", function () {
			    hideLoader();
			});
		/*]]>*/
	</script>
</head>

<body>
	<div class="bob-loader" role="status">
		<div class="text-center">
			<img th:src="@{/images/bobn.png}" height="60" alt="Loading...">
			<div class="progress mt-2" style="height: 5px; width: 200px;">
				<div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" style="width: 100%">
				</div>
			</div>
		</div>
	</div>

	<div th:insert="~{XBRLHeaderMenu :: header}" class="fixed-top"></div>

	<div class="container-fluid user-profile-page">
		<!-- LIST VIEW -->
		<div th:if="${formmode == 'list'}" id="tabHeader">
			<div class="user-list-card">
			<div class="role-page-header d-flex justify-content-between align-items-center">

			    <!-- LEFT SIDE -->
			    <div class="d-flex align-items-center">

			        <button class="static-back-btn" onclick="goBack()" title="Go Back">
			            <i class="fa fa-arrow-left"></i>
			        </button>
					<h4 style="margin:0; line-height:36px; font-family: Verdana; font-size: 20px; font-weight: bold; color: #0D0D0C;">USER PROFILE</h4>
			       

			    </div>

			    <!-- RIGHT SIDE -->
			    <button class="role-btn"
			        th:if="${session.ROLEID == 'ADM-M' or session.ROLEID == 'ADM-C'}"
			        onclick="adduser()">
			        Create User
			    </button>

			</div>
			<div class="table-wrap">
					<table class="table refund-table align-middle mb-0" id="usertable" style="width:100%">
						<thead>
							<tr>
								<th style="text-align:left;">USER ID</th>
								<th style="text-align:left;">USER NAME</th>
								<th style="text-align:left;">EMP ID</th>
								<th style="text-align:left;">BRANCH NAME</th>
								<th style="text-align:left;">STATUS</th>
								<th>ACTION</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="up : ${userProfiles}">
								<td th:text="${up.userid}"></td>
								<td th:text="${up.username}"></td>
								<td th:text="${up.empid}"></td>
								<td th:text="${up.branch_name}"></td>
								<td>
									<span th:if="${up.entity_flg == 'Y'}"
										class="text-success font-weight-bold">Verified</span>
									<span th:if="${up.entity_flg == 'N'}"
										class="text-danger font-weight-bold">Pending</span>
								</td>
								<td class="text-center">
									<i class="fa fa-eye text-info mr-3" style="cursor:pointer" title="View"
										th:attr="data-userid=${up.userid}" onclick="fnView(this)"></i>
									<i class="fa fa-edit text-primary mr-3" style="cursor:pointer" title="Edit"
										th:if="${session.ROLEID == 'ADM-M' or session.ROLEID == 'ADM-C'}"
										th:attr="data-userid=${up.userid}" onclick="fnEdit(this)"></i>
									<i class="fa fa-check-circle text-success" style="cursor:pointer" title="Verify"
										th:if="${session.ROLEID == 'ADM-C' and up.entity_flg == 'N'}"
										th:attr="data-userid=${up.userid}" onclick="fnVerify(this)"></i>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<!-- FORM VIEW -->
		<div th:if="${formmode != 'list'}">
			<form id="userForm" th:object="${userProfile}" autocomplete="off">
				<input type="hidden" id="formmode" th:value="${formmode}">
				<div class="user-form-card shadow-sm">
					<div class="role-page-header d-flex justify-content-between">
						<div class="d-flex align-items-center">

								        <button class="static-back-btn" onclick="goBack()" title="Go Back">
								            <i class="fa fa-arrow-left"></i>
								        </button>
						<h4 class="m-0" th:text="'User Profile - ' + ${#strings.toUpperCase(formmode)}"></h4>
						</div>
					<button type="button" class="role-btn" onclick="list()">List</button>
											
					</div>
					<div class="card-body user-form-card-body">
						<!-- Row 1 -->
						<div class="row formline">
							<label class="col-sm-2">User ID <span class="text-danger">*</span></label>
							<div class="col-sm-3">
								<input type="text" th:field="*{userid}" id="userid" class="form-control form-control-sm"
									th:readonly="${formmode != 'add'}" onblur="validateUserId()" required>
								<span id="feedbackuser"></span>
							</div>
							<div class="col-sm-1"></div>
							<label class="col-sm-2">User Name <span class="text-danger">*</span></label>
							<div class="col-sm-3">
								<input type="text" th:field="*{username}" class="form-control form-control-sm"
									th:readonly="${formmode == 'view' || formmode == 'verify'}" required>
							</div>
						</div>

						<!-- Row 2 -->
						<div class="row formline">
