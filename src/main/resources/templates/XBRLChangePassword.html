<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Change Password</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/CustomButton.css}">
	<style>
		body {
			background: #f4f6f9;
			font-family: Verdana, sans-serif;
		}
		.change-card {
			max-width: 520px;
			margin: 70px auto;
			background: #fff;
			border-radius: 10px;
			box-shadow: 0 6px 20px rgba(0,0,0,0.1);
			padding: 30px;
		}
		.page-title {
			color: #004481;
			font-weight: 700;
			text-align: center;
			margin-bottom: 20px;
		}
		.help-text {
			font-size: 13px;
			color: #6c757d;
		}
	</style>
</head>
<body>
	<div class="change-card">
		<h3 class="page-title">Change Password</h3>
		<p class="help-text" th:if="${forceChange}">First login detected. You must change your password to continue.</p>
		<p class="help-text" th:if="${passwordExpired}">Your password is expired. Please set a new password to continue.</p>
		<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
		<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
		<div th:if="${success}" class="text-center">
			<a th:href="@{/Dashboard}" class="btn btn-primary">OK</a>
		</div>
		<form th:if="${success == null}" th:action="@{/change-password}" method="post" autocomplete="off">
			<div class="form-group">
				<label for="newPassword">New Password</label>
				<input type="password" class="form-control" id="newPassword" name="newPassword" required>
			</div>
			<div class="form-group">
				<label for="confirmPassword">Confirm Password</label>
				<input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
			</div>
			<div class="help-text mb-3">
				Password must be at least 14 characters and include uppercase, lowercase, number, and special character.
			</div>
			<button type="submit" class="btn btn-primary btn-block">Update Password</button>
		</form>
	</div>
</body>
</html>
