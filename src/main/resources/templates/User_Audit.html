							<script>
								function goBack() {
								    window.history.back();
								}

								function goForward() {
								    window.history.forward();
								}

								// Detect mouse near screen edges
								document.addEventListener('mousemove', function(e) {
								    const backBtn = document.getElementById('floatingBackBtn');
								    const forwardBtn = document.getElementById('floatingForwardBtn');
								    const screenWidth = window.innerWidth;

								    // Left edge (back)
								    if (e.clientX < 50) {
								        backBtn.classList.add('show');
								    } else {
								        backBtn.classList.remove('show');
								    }

								    // Right edge (forward)
								    if (screenWidth - e.clientX < 50) {
								        forwardBtn.classList.add('show');
								    } else {
								        forwardBtn.classList.remove('show');
								    }
								});
								</script>

								<style>
								/* Shared styles for both buttons */
								#floatingBackBtn, 
								#floatingForwardBtn {
								    position: fixed;
								    top: 50%;
								    background-color: #0073e6;
								    border: none;
								    color: white;
								    font-size: 20px;
								    border-radius: 50%;
								    width: 45px;
								    height: 45px;
								    display: flex;
								    align-items: center;
								    justify-content: center;
								    opacity: 0;
								    pointer-events: none;
								    transition: all 0.4s ease;
								    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
								    z-index: 999;
								}

								/* Back button */
								#floatingBackBtn {
								    left: -50px; /* hidden off-screen */
								}

								/* Forward button */
								#floatingForwardBtn {
								    right: -50px; /* hidden off-screen */
								}

								/* Show when near edge */
								#floatingBackBtn.show {
								    left: 20px;
								    opacity: 1;
								    pointer-events: auto;
								}

								#floatingForwardBtn.show {
								    right: 20px;
								    opacity: 1;
								    pointer-events: auto;
								}

								/* Hover animation */
								#floatingBackBtn:hover,
								#floatingForwardBtn:hover {
								    background-color: #005bb5;
								    transform: scale(1.1);
								}
								</style>

<script th:inline="javascript">

	$(document).ready(function () {

					dom: '<"d-flex justify-content-between align-items-center mb-2"f p>t'
				});

				
			});
		
	document.getElementById("searchDate").addEventListener("change", function () {
		const selectedDate = this.value;
		filterByDate(selectedDate);
	});

	function filterByDate(dateString) {
		//alert(dateString);
		location.href="./User_Audit?reportdata="+dateString
	}
	
	function downloadAuditReport() {

	    var table = document.getElementById("userAuditLevelTb");

	    var html = "<table border='1'>";

	    // Header with color
	    html += "<thead style='background-color: var(--table-header-blue, #2563EB);color:white;font-weight:bold;'>";

	    var headerCells = table.querySelectorAll("thead th");
	    html += "<tr>";
	    headerCells.forEach(function(th) {
	        html += "<th style='padding:8px;'>" + th.innerText + "</th>";
	    });
	    html += "</tr></thead>";

	    // Body
	    html += "<tbody>";

	    var rows = table.querySelectorAll("tbody tr");

	    rows.forEach(function(row) {

	        if (row.style.display !== "none") { // only visible rows

	            html += "<tr>";

	            var cols = row.querySelectorAll("td");

	            cols.forEach(function(col) {

	                html += "<td style='padding:6px; white-space:normal;'>"
	                        + col.innerText +
	                        "</td>";

	            });

	            html += "</tr>";
	        }
	    });

	    html += "</tbody></table>";

	    var blob = new Blob(['\ufeff', html], {
	        type: "application/vnd.ms-excel"
	    });

	    var url = URL.createObjectURL(blob);

	    var a = document.createElement("a");
	    a.href = url;
	    a.download = "User_Audit_Report.xls";

	    document.body.appendChild(a);
	    a.click();

	    document.body.removeChild(a);
	}
</script>
