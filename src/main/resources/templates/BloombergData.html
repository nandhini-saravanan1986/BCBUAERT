	<style>
		.modal-backdrop {
			position: fixed;
			top: 0;
			left: 0;
			width: 120vw !important;
			/* 👈 a bit wider than viewport */
			height: 120vh !important;
			/* 👈 a bit taller than viewport */
			background-color: #000;
			/* 👈 solid black base */
			opacity: 0.7 !important;
			/* 👈 slightly darker overlay */
			z-index: 1062;
			/* 👈 ensures it sits below modal but above everything else */
		}

		:root {
			--bob-orange: #0073e6;
			--bob-blue: #004080;
			--overlay-bg: rgba(255, 255, 255, 0.9);
		}

		/* Full-screen overlay */
		.bob-loader {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(226, 232, 237, 0.6);
			/* lighter background */
			backdrop-filter: blur(8px);
			/* ✅ background blur */
			-webkit-backdrop-filter: blur(8px);
			/* Safari support */
			z-index: 9999;
			transition: opacity 0.25s ease, visibility 0.25s;
			opacity: 1;
			visibility: visible;
		}

		/* Hide when not active */
		.bob-loader[aria-hidden="true"] {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		/* Loader card */
		.bob-loader-card {
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		/* Static logo */
		.logo-imgs {
			height: 90px;
			object-fit: contain;
			display: block;
		}

		/* Flowing bar below logo */
		.flow-bar {
			position: relative;
			width: 200px;
			/* ✅ increased width */
			height: 8px;
			/* slightly thicker for better visibility */
			background: #f1f1f1;
			border-radius: 4px;
			overflow: hidden;
			margin-top: 10px;
		}

		.flow-line {
			position: absolute;
			left: -40%;
			top: 0;
			width: 40%;
			height: 100%;
			background: linear-gradient(90deg, var(--bob-orange), var(--bob-blue));
			border-radius: 4px;
			animation: flowMove 1.2s linear infinite;
		}

		/* Animation for flowing line */
		@keyframes flowMove {
			0% {
				left: -40%;
			}

			100% {
				left: 100%;
			}
		}
	</style>

	<style>
		/* Shared styles for both buttons */
		#floatingBackBtn,

			top: 50%;

			border: none;
			color: white;
			font-size: 20px;
			border-radius: 50%;
			width: 45px;

			display: flex;

			justify-content: center;

			pointer-events: none;
			transition: all 0.4s ease;

			z-index: 999;

		/* Back button */

		}

		/* Forward button */
		#floatingForwardBtn {
			right: -50px;
			/* hidden off-screen */
		}

		#floatingBackBtn.show {
			left: 20px;
			opacity: 1;
			pointer-events: auto;
		}

		#floatingForwardBtn.show {
			right: 20px;

			pointer-events: auto;
		}

	<script>
		document.addEventListener('mousemove', function (e) {
			const backBtn = document.getElementById('floatingBackBtn');
			const forwardBtn = document.getElementById('floatingForwardBtn');
			const screenWidth = window.innerWidth;

			// Only run logic if buttons actually exist on the current page
			if (backBtn && forwardBtn) {
				// Left edge (back)
				if (e.clientX < 50) {
					backBtn.classList.add('show');
				} else {
					backBtn.classList.remove('show');
				}

				// Right edge (forward)
				if (screenWidth - e.clientX < 50) {
					forwardBtn.classList.add('show');
				} else {
					forwardBtn.classList.remove('show');
				}
			}
		});
	</script>

				/* white text */
				font-weight: bold !important;
			}

			/* Disabled buttons (Prev/Next when not available) */
			.dataTables_wrapper .dataTables_paginate .paginate_button.disabled {
				background: #eeeeee !important;
				color: #bbbbbb !important;
				border-color: #e1e1e1 !important;
				cursor: default !important;
			}
		
	</style>
	<script>
	
	function deletesubmit(event) {

	    event.preventDefault();
	    
	    
	    if (!confirm("Are you sure you want to delete this data?")) {
	        return;
	    }

	    var form = document.getElementById("bloombergForm");

	    if (!form.checkValidity()) {
	        form.reportValidity();
	        return;
	    }

	    document.getElementById("bob-loader").setAttribute("aria-hidden", "false");

	    var formmode = "Delete"; 

	    var formData = $("#bloombergForm").serialize();

	    console.log("Sending Data:", formData);

	    $.ajax({
	        url: "./saveBloomberg",
	        type: "POST",
	        data: formData + "&formmode=" + formmode,
	        success: function(response) {

	            document.getElementById("bob-loader").setAttribute("aria-hidden", "true");

	            $("#alertmsg").text(response);
	            $('#alert').modal("toggle");

	        },
	        error: function(xhr) {

	            document.getElementById("bob-loader").setAttribute("aria-hidden", "true");

	            console.error(xhr);

	            $("#alertmsg").text("Error while deleting ❌");
	            $('#alert').modal("toggle");
	        }
	    });
	}
	
	
	function submitBloomberg(event) {
	    event.preventDefault();

	    let form = document.getElementById("bloombergForm");

	    if (!form.checkValidity()) {
	        form.reportValidity();
	        return;
	    }

	    document.getElementById("bob-loader").setAttribute("aria-hidden", "false");
	    let formmode = document.getElementById("formmode").value;

	    var formData = $("#bloombergForm").serialize();

	    console.log("Sending Data:", formData); // DEBUG

	    $.ajax({
	        url: "./saveBloomberg",
	        type: "POST",
	        data: formData + "&formmode="+formmode, // safer
	        success: function(response) {
	            console.log("Response:", response);

	            document.getElementById("bob-loader").setAttribute("aria-hidden", "true");
	            	$("#alertmsg").text(response);
					$('#alert').modal("toggle");
	                
	            
	        },
	        error: function(xhr) {
	            document.getElementById("bob-loader").setAttribute("aria-hidden", "true");
	            console.error(xhr);
	            $("#alertmsg").text("Error while saving ❌");
				$('#alert').modal("toggle");
	        }
	    });
	}
	</script>

	
	</head>
<title>RiskInsights</title>

<body>
	<div>
		<div class="row">

			<div class="col-sm-12">

				<div th:if="${formmode}=='list'">

						<div id="pageHeader" class="role-page-header">
							<div class="d-flex align-items-center">

									<button class="static-back-btn" onclick="goBack()" title="Go Back">

									</button>

								<h4 th:text="${menu}"></h4>

							</div>

													<th class="th-left" style="width: 7%">Coupon Type</th>
													<th class="th-left" style="width: 7%">Name</th>
													<th class="th-left" style="width: 15%">Country Of Risk</th>
													<th class="th-left" style="width: 7%">Des</th>
													<th class="th-left" style="width: 8%">Sector</th>
													<th class="th-left" style="width: 8%">Currency</th>
													<th class="th-rigth" style="width: 8%">Amount Issued</th>
													<th class="th-left" style="width: 8%">Clean Price</th>
													<th class="th-left" style="width: 8%">YTM</th>
													<th class="th-left" style="width: 8%">Maturity Date</th>
													<th class="th-center" style="width: 8%">Status</th>
													<th class="th-left" style="width: 8%" th:if="${roleId}=='ADM-M'">Action</th>
												</tr>
											
										</thead>
										<tbody>
											<tr th:each="BloombergData : ${BloombergDatalist}">
													<td th:text="${BloombergData?.isin}"></td>
													<td th:text="${BloombergData?.couponType}"></td>
													<td th:text="${BloombergData?.name}"></td>
													<td th:text="${BloombergData?.countryOfRisk}"></td>
													<td th:text="${BloombergData?.description}"></td>
													<td th:text="${BloombergData?.sector}"></td>
													<td th:text="${BloombergData?.currency}"></td>
													<td style="text-align:right;" th:text="${#numbers.formatDecimal(BloombergData?.amountIssued,1,'COMMA',2,'POINT')}"></td>
													<td style="text-align:right;" th:text="${BloombergData?.cleanPrice}"></td>
													<td style="text-align:right;" th:text="${BloombergData?.ytm}"></td>
													<td th:text="${#dates.format(BloombergData?.maturityDate,'dd-MM-yyyy')}"></td>
													<th:block th:switch="${BloombergData?.statusflg}">
												    <td th:case="'Y'" style="text-align:center; color: green;">Active</td>
												    <td th:case="'N'" style="text-align:center; color: red;">In Active</td>	
												    <td th:case="null" style="text-align:center; color: red;">In Active</td>
													</th:block>
													<td class="text-center" th:if="${roleId}=='ADM-M'">
														<i class="fa fa-edit action-icon modify" style="cursor: pointer; color: #ff7f27; margin-right: 12px;"
															title="Modify"  th:attr="data-isin=${BloombergData.isin}" onclick="edit_btn_submit(this)"></i>
													</td>		
											</tr>
										</tbody>
									</table>
								</div>
							</div>
						</div>


					</div>
				</div>


					<div th:if="${formmode} == 'add' or ${formmode} == 'edit'">
					    <div class="row">
					        <div class="col-sm-12">
					            <form action="#" method="post" th:object="${BloombergData}" id="bloombergForm" autocomplete="off" onsubmit="submitBloomberg(event)">
									<input type="hidden" id="formmode" th:value="${formmode}" />
					                <div class="card">
					
					                    <!-- Header -->
					                    <div class="role-page-header d-flex justify-content-between align-items-center">
					
					                        <div class="d-flex align-items-center">

					                                <i class="fa fa-arrow-left"></i>
					                            </button>

					                                <h4>Add Bloomberg Data</h4>
					                            </div>
					                        </div>
					
					                        <div>
					                            <button type="button" class="role-btn" onclick="list();">List</button>
					                        </div>
					
					                    </div>
					
					                    <!-- Form Body -->
					                    <div class="card-body">
					
					                        <!-- Row 1 -->
					                        <div class="row formline">
					                            <div class="col-sm-2">
					                                <label>ISIN <span style="color:red">*</span></label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="text" th:field="*{isin}" id="isin" class="form-control form-control-sm" required />
					                            </div>
					
					                            <div class="col-sm-2">
					                                <label>Coupon Type</label>

					                                <input type="text" th:field="*{couponType}" class="form-control form-control-sm" required />
					                            </div>
					                        </div>
					
					                        <!-- Row 2 -->
					                        <div class="row formline">
					                            <div class="col-sm-2">
					                                <label>Name</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="text" th:field="*{name}" class="form-control form-control-sm" required />
					                            </div>
					
					                            <div class="col-sm-2">
					                                <label>Country Of Risk</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="text" th:field="*{countryOfRisk}" class="form-control form-control-sm" required />
					                            </div>
					                        </div>
					
					                        <!-- Row 3 -->
					                        <div class="row formline">
					                            <div class="col-sm-2">
					                                <label>Description</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="text" th:field="*{description}" class="form-control form-control-sm" required />
					                            </div>
					
					                            <div class="col-sm-2">
					                                <label>Sector</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="text" th:field="*{sector}" class="form-control form-control-sm" required />
					                            </div>
					                        </div>
					
					                        <!-- Row 4 -->
					                        <div class="row formline">
					                            <div class="col-sm-2">
					                                <label>Currency</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="text" th:field="*{currency}" class="form-control form-control-sm" required />
					                            </div>
					
					                            <div class="col-sm-2">

					                            </div>
					                            <div class="col-sm-4">

					                            </div>
					                        </div>
					
					                        <!-- Row 5 -->
					                        <div class="row formline">
					                            <div class="col-sm-2">
					                                <label>Clean Price</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="number" step="0.01" th:field="*{cleanPrice}" class="form-control form-control-sm" required />
					                            </div>
					
					                            <div class="col-sm-2">
					                                <label>YTM</label>
					                            </div>
					                            <div class="col-sm-4">
					                                <input type="number" step="0.01" th:field="*{ytm}" class="form-control form-control-sm" required />
					                            </div>
					                        </div>
					
					                        <!-- Row 6 -->
					                        <div class="row formline">
					                            <div class="col-sm-2">
					                                <label>Maturity Date</label>
					                            </div>
					                            <div class="col-sm-4">
