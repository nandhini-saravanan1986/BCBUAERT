                                max: yScale.max,
                                stepSize: yScale.stepSize,
                                fontSize: 10,
                                callback: function (tickValue) {
                                    if (valueMode === "percent_total") {
                                        return tickValue + "%";
                                    }
                                    return tickValue;
                                }
                            }
                        }]
                    }
                }
            });
            } finally {
                updatePivotChartDownloadUi();
            }
        }

        function renderPivotGrid(payload, dataRows) {
            resultTableHeadEl.innerHTML = "";
            resultTableBodyEl.innerHTML = "";
            state.lastPivotView = null;
            destroyPivotChart();
            pivotChartWrapEl.style.display = "none";
            pivotChartHintEl.style.display = "none";
            pivotChartPieSeriesWrapEl.style.display = "none";

            var view = buildPivotViewFromData(payload, dataRows);
            if (!view) {
                var tr = document.createElement("tr");
                var td = document.createElement("td");
                td.colSpan = 10;
                td.textContent = "No data";
                tr.appendChild(td);
                resultTableBodyEl.appendChild(tr);
                return;
            }

            state.lastPivotView = view;
            renderPivotTableFromView(view);

            renderPivotChart();
        }

        function saveLayout() {
            var layout = {
                layoutName: layoutNameEl.value.trim(),
                tableName: state.selectedTable,
                rowDimensions: state.rows.map(function (r) {
                    return { columnName: r.columnName };
                }),
                columnDimensions: state.columns.map(function (r) {
                    return { columnName: r.columnName };
                }),
                aggregation: aggregationTypeEl.value,
                valueColumns: getSelectedMeasureColumns(),
                valueColumn: (function () {
                    var cols = getSelectedMeasureColumns();
                    return cols.length ? cols[0] : "";
                })(),
                aggregateTransform: aggregationTypeEl.value === "SUM" ? aggregateTransformEl.value : "NONE",
                aggregateTransformOperand: aggregationTypeEl.value === "SUM" && aggregateTransformEl.value !== "NONE"
                    ? (aggregateTransformOperandEl.value || "").trim() : ""
            };
            if (!layout.layoutName) {
                setStatus("Layout name is required.");
                return;
            }
            setStatus("Saving...");
            fetchJson(apiUrl("/api/analytical/layouts"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(layout)
            }).then(function () {
                setStatus("Layout saved.");
                loadLayouts();
            }).catch(function (err) {
                setStatus(err.message);
            });
        }

        function loadLayouts() {
            fetchJson(apiUrl("/api/analytical/layouts"))
                .then(function (layouts) {
                    savedLayoutsEl.innerHTML = "";
                    var defaultOption = document.createElement("option");
                    defaultOption.value = "";
                    defaultOption.textContent = "-- Select Layout --";
                    savedLayoutsEl.appendChild(defaultOption);
                    (layouts || []).forEach(function (layout) {
                        var option = document.createElement("option");
                        option.value = JSON.stringify(layout);
                        option.textContent = layout.layoutName;
                        savedLayoutsEl.appendChild(option);
                    });
                }).catch(function (err) {
                    setStatus(err.message);
                });
        }

        function dimFromLayout(listDims, listLegacy) {
            if (listDims && listDims.length) {
                return listDims.map(function (d) {
                    var cn = normalizeName(d.columnName);
                    var m = getColumnMeta(cn);
                    return {
                        columnName: cn,
                        filterValues: [],
                        dataType: m ? m.dataType : ""
                    };
                });
            }
            return (listLegacy || []).map(function (c) {
                var cn = normalizeName(c);
                var m = getColumnMeta(cn);
                return { columnName: cn, filterValues: [], dataType: m ? m.dataType : "" };
            });
        }

        function applySelectedLayout() {
            var raw = savedLayoutsEl.value;
            if (!raw) {
                setStatus("Please select a layout.");
                return;
            }
            var layout = JSON.parse(raw);
            layoutNameEl.value = layout.layoutName || "";
            aggregationTypeEl.value = layout.aggregation || "COUNT";
            activateTableTab(layout.tableName);
            loadColumns(layout.tableName, function () {
                state.rows = dimFromLayout(layout.rowDimensions, layout.rowColumns);
                state.columns = dimFromLayout(layout.columnDimensions, layout.columnColumns);
                renderDropItems();
                setMeasureColumnsFromLayout(layout.valueColumn, layout.valueColumns);
                aggregateTransformEl.value = layout.aggregateTransform || "NONE";
                aggregateTransformOperandEl.value = layout.aggregateTransformOperand || "";
                toggleSumTransformUI();
                setStatus("Layout loaded.");
            });
        }

        function downloadExcel() {
            var payload = getPivotPayload();
            setStatus("Preparing download...");
            fetch(apiUrl("/api/analytical/pivot/export"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(function (resp) {
                if (!resp.ok) {
                    return resp.text().then(function (txt) {
                        throw new Error(txt || "Download failed");
                    });
                }
                var disposition = resp.headers.get("Content-Disposition") || "";
                var filename = "Analytical_Pivot.xlsx";
                var match = disposition.match(/filename=\"?([^\";]+)\"?/i);
                if (match && match[1]) {
                    filename = match[1];
                }
                return resp.blob().then(function (blob) {
                    var url = window.URL.createObjectURL(blob);
                    var a = document.createElement("a");
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    setStatus("Download started.");
                });
            }).catch(function (err) {
                setStatus(err.message);
            });
        }

        function init() {
            bindDropZone("rowsDropZone", "rows");
            bindDropZone("columnsDropZone", "columns");
            bindDropZone("filtersDropZone", "filters");
            clearResultAndChart();
            setStatus("");
            var refreshBtn = document.getElementById("analyticalRefreshBtn");
            var clearBtn = document.getElementById("analyticalClearBtn");
            if (refreshBtn) {
                refreshBtn.addEventListener("click", function () {
                    window.location.reload();
                });
            }
            if (clearBtn) {
                clearBtn.addEventListener("click", clearPivotPage);
            }
            document.getElementById("runPivotBtn").addEventListener("click", runPivot);
            document.getElementById("saveLayoutBtn").addEventListener("click", saveLayout);
            document.getElementById("loadLayoutBtn").addEventListener("click", applySelectedLayout);
            document.getElementById("downloadExcelBtn").addEventListener("click", downloadExcel);
            aggregationTypeEl.addEventListener("change", toggleSumTransformUI);
            aggregateTransformEl.addEventListener("change", toggleSumTransformUI);
            toggleSumTransformUI();
            if (columnSearchInputEl) {
                columnSearchInputEl.addEventListener("input", renderColumnsList);
                columnSearchInputEl.addEventListener("search", function () {
                    renderColumnsList();
                });
            }
            if (pivotChartTypeEl) {
                pivotChartTypeEl.addEventListener("change", renderPivotChart);
            }
            if (pivotChartPieSeriesEl) {
                pivotChartPieSeriesEl.addEventListener("change", renderPivotChart);
            }
            if (pivotChartAxisLayoutEl) {
                pivotChartAxisLayoutEl.addEventListener("change", renderPivotChart);
            }
            if (pivotChartPieSliceModeEl) {
                pivotChartPieSliceModeEl.addEventListener("change", renderPivotChart);
            }
            if (pivotChartValueModeEl) {
                pivotChartValueModeEl.addEventListener("change", renderPivotChart);
            }
            if (pivotChartDownloadBtn) {
                pivotChartDownloadBtn.addEventListener("click", downloadPivotChartAsImage);
            }
            if (pivotShowRowTotalsEl) {
                pivotShowRowTotalsEl.addEventListener("change", refreshPivotTotalsTable);
            }
            if (pivotShowColTotalsEl) {
                pivotShowColTotalsEl.addEventListener("change", refreshPivotTotalsTable);
            }
            updatePivotChartDownloadUi();

            fetchJson(apiUrl("/api/analytical/tables"))
                .then(function (tables) {
                    renderTabs(tables || []);
                    loadLayouts();
                })
                .catch(function (err) {
                    setStatus(err.message);
                });
        }

        init();
    })();
</script>
